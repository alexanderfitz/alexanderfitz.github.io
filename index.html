<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander Fitz</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            color: #111827;
        }

        p {
            color: #6b7280;
            margin-bottom: 2rem;
        }

        .button {
            display: inline-block;
            padding: 0.9rem 1.8rem;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>👋 Willkommen</h1>
    <p>Github Page von <strong>Alexander Fitz</strong></p>

    <a class="button" href="/tarifoptimierer/">
        🚆 Zum VVV Tarif-Optimierer
    </a>
</div>

</body>
</html>
